server:
  port: 8081

spring:
  application:
    name: invoice-intake-service

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        # Use JSON as other for H2 compatibility (instead of JSONB)
        type:
          json:
            format: org.hibernate.type.SqlTypes.JSON

  flyway:
    enabled: false

# Apache Camel
camel:
  springboot:
    name: invoice-intake-camel-test

# Application-specific configuration
app:
  kafka:
    topics:
      invoice-intake: invoice.intake
      intake-dlq: invoice.intake.dlq
      tax-invoice: invoice.received.tax-invoice
      receipt: invoice.received.receipt
      invoice: invoice.received.invoice
      debit-credit-note: invoice.received.debit-credit-note
      cancellation: invoice.received.cancellation
      abbreviated: invoice.received.abbreviated
    bootstrap-servers: localhost:9092

# Eureka client disabled for tests
eureka:
  client:
    enabled: false

# Actuator endpoints
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health

# Logging configuration
logging:
  level:
    root: WARN
    com.invoice.intake: DEBUG
    org.hibernate.SQL: WARN
